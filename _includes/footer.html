<footer class="site-footer">
<div class="footer-content">
<p>&copy; {{ site.time | date: '%Y' }} Minoru Osawa. Powered by <a href="https://jekyllrb.com/">Jekyll</a>.</p>
<p>
<ul class="footer-nav">
  {% for item in site.footer_nav %}
    <li><a href="{{ item.url }}">{{ item.label }}</a></li>
  {% endfor %}
</ul>
</p>
</div>
</footer>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    },
    options: {
        renderActions: {
            wrapDisplay: [200, (doc) => {
                const displayMath = document.querySelectorAll('mjx-container[display="true"]');
                displayMath.forEach(el => {
                const wrapper = document.createElement('div');
                wrapper.className = 'math-scroll';
                el.parentNode.insertBefore(wrapper, el);
                wrapper.appendChild(el);
                });
            }, '']
        }
    }
  };
</script>
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>
<script src="/assets/js/utils.js"></script>
